<header class="navbar-wrapper">
  <nav class="navbar surface-card">
    <button class="brand" type="button" (click)="selectSection('hero')" aria-label="Go to top">
      <span class="brand-mark">TG</span>
      <span class="brand-name">{{ name }}</span>
    </button>

    <button
      class="mobile-toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Toggle navigation"
    >
      <span class="material-symbols-rounded">{{ isMenuOpen ? 'close' : 'menu' }}</span>
    </button>

    <ul class="menu" [class.menu-open]="isMenuOpen">
      @for (item of items; track item.id) {
        <li>
          <button type="button" (click)="selectSection(item.id)">
            {{ item.label }}
          </button>
        </li>
      }
      <li>
        <button type="button" class="theme-button" (click)="toggleTheme()" aria-label="Toggle theme">
          <span class="material-symbols-rounded">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
          <span>{{ isDarkMode ? 'Light' : 'Dark' }}</span>
        </button>
      </li>
    </ul>
  </nav>
</header>
